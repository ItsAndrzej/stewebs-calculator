<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SteWeb's Ballistic Calculator</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040b11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SteWeb">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">

  <!-- ── Main Column ── -->
  <div class="main-col">

    <div id="installBanner">
      <span><i class="fas fa-download"></i> <span data-i18n="installText"></span></span>
      <button id="installBtn" data-i18n="installBtn"></button>
    </div>

    <div class="header">
      <div class="logo-box">
        <i class="fas fa-bullseye" style="font-size:20px;"></i>
        <i class="fas fa-calculator" style="position:absolute;bottom:7px;right:7px;font-size:9px;opacity:0.75;"></i>
      </div>
      <div class="header-text">
        <div class="app-eyebrow">SteWeb's</div>
        <div class="app-title">Ballistic Calculator</div>
      </div>
      <div class="lang-toggle">
        <button id="langSE" onclick="setLang('sv')">SE</button>
        <button id="langEN" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <div class="fields">

      <div class="field-row">
        <div class="field">
          <label for="pelletSelect" data-i18n="pelletSelectLabel"></label>
          <select id="pelletSelect">
            <option value="" data-i18n-opt="pelletSelectDefault"></option>
          </select>
        </div>
        <div class="field-sm">
          <label for="caliber" data-i18n="caliberLabel"></label>
          <input id="caliber" type="number" step="0.01" placeholder="0.00">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="pellet" data-i18n="pelletNameLabel"></label>
          <input id="pellet" type="text" data-i18n-placeholder="pelletNamePlaceholder">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="weight" data-i18n="weightLabel"></label>
          <input id="weight" type="number" step="0.01">
        </div>
        <div class="field-sm">
          <label for="weightUnit" data-i18n="unitLabel"></label>
          <select id="weightUnit">
            <option value="grains">grains</option>
            <option value="grams" data-i18n-opt="gramsOpt"></option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="velocity" data-i18n="velocityLabel"></label>
          <input id="velocity" type="number" step="0.1">
        </div>
        <div class="field-sm">
          <label for="velUnit" data-i18n="unitLabel"></label>
          <select id="velUnit">
            <option value="m/s">m/s</option>
            <option value="fps">fps</option>
          </select>
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <div class="result-panel">
      <div class="result-eyebrow" data-i18n="resultLabel"></div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label" data-i18n="energyLabel"></div>
          <div class="result-primary" id="outEnergyJ">--<span class="unit">J</span></div>
          <div class="result-secondary" id="outEnergyFt">-- ft·lbf</div>
        </div>
        <div class="result-item">
          <div class="result-label" data-i18n="caliberResultLabel"></div>
          <div class="result-primary" id="outCalMm">--<span class="unit">mm</span></div>
          <div class="result-secondary" id="outCalIn">-- "</div>
        </div>
        <div class="result-item">
          <div class="result-label" data-i18n="weightResultLabel"></div>
          <div class="result-primary" id="outWeightG">--<span class="unit">g</span></div>
          <div class="result-secondary" id="outWeightGr">-- gr</div>
        </div>
        <div class="result-item">
          <div class="result-label" data-i18n="velocityLabel"></div>
          <div class="result-primary" id="outVelMs">--<span class="unit">m/s</span></div>
          <div class="result-secondary" id="outVelFps">-- fps</div>
        </div>
      </div>
      <div id="legalSidenote" class="legal-sidenote"></div>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="saveBtn"><i class="fas fa-star"></i> <span data-i18n="saveBtn"></span></button>
      <button class="btn danger"  id="clearBtn"><span data-i18n="clearBtn"></span></button>
    </div>

    <div class="note" data-i18n="note"></div>
  </div>

  <!-- ── Side Column ── -->
  <div class="side-col">
    <div class="fav-card" aria-live="polite">
      <div class="fav-head">
        <div>
          <div class="fav-eyebrow" data-i18n="favSubtitle"></div>
          <div class="fav-title"   data-i18n="favTitle"></div>
        </div>
        <div class="fav-btns">
          <button class="fav-btn" id="exportBtn" data-i18n="exportBtn"></button>
          <button class="fav-btn" id="importBtn" data-i18n="importBtn"></button>
        </div>
      </div>
      <div class="fav-list" id="favList"></div>
      <div class="fav-footer" data-i18n="favFooter"></div>
    </div>
  </div>

</div>

<!-- Scripts — order matters: constants → translations → calculator → favorites → app -->
<script src="js/constants.js"></script>
<script src="js/translations.js"></script>
<script src="js/calculator.js"></script>
<script src="js/favorites.js"></script>
<script src="js/app.js"></script>
</body>
</html>
